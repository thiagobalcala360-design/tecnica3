            </div>
            <div class="card-sub">La revisaremos a la brevedad</div>
          </div>
          <button class="close-btn" id="close-btn" aria-label="Cerrar">&#x2715;</button>
        </div>

        <div class="form-group">
          <label for="suggestion-text">Mensaje</label>
          <textarea id="suggestion-text" placeholder="&#161;Escribinos tu sugerencia!" maxlength="500"></textarea>
          <div class="char-count" id="char-count">0 / 500</div>
        </div>

        <div class="form-group">
          <label>Imagen adjunta <span style="font-weight:400;opacity:0.7">(opcional)</span></label>
          <div class="upload-zone">
            <input type="file" accept="image/*" id="img-input" aria-label="Adjuntar imagen">
            <span id="upload-label">Imagen adjunta</span>
          </div>
          <div class="img-note" id="img-note">* La imagen se adjunta manualmente desde tu cliente de email.</div>
          <div class="img-preview" id="img-preview">
            <img id="preview-img" src="" alt="Vista previa">
            <button class="remove-img" id="remove-img" aria-label="Quitar imagen">&#x2715;</button>
          </div>
        </div>

        <button class="btn-send" id="btn-send">
          Enviar por email
        </button>
      </div>

      <div class="success-state" id="success-state">
        <div class="success-icon">&#10003;</div>
        <div class="success-title">Sugerencia enviada con exito!</div>
        <div class="success-sub">
          Se abrio tu cliente de email con el mensaje listo.<br>
          Gracias por tomarte el tiempo!
        </div>
        <button class="btn-reset" id="btn-reset">Enviar otra sugerencia</button>
      </div>

    </div>
  </div>
