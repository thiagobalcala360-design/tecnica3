<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="diseñopancartaSGB.css">
  <title>Pancarta de Sugerencias</title>
</head>
<body>

<!-- ══ HEADER ══ -->
<header>
  <div>
    <p>Tablero colectivo</p>
    <h1>Pancarta de <span>Sugerencias</span></h1>
  </div>
</header>

<!-- ══ CONTROLS ══ -->
<div class="controls">
  <button class="btn btn-add" onclick="openModal()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Agregar sugerencia
  </button>
  <button class="btn btn-del" id="btnDel" onclick="toggleDeleteMode()">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
    Eliminar sugerencia
  </button>
</div>

<!-- ══ GRID ══ -->
<div class="grid" id="grid"></div>

<!-- ══ MODAL ══ -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2>Nueva <span>Sugerencia</span></h2>
    <div class="form-group">
      <label>Texto de la sugerencia</label>
      <textarea id="inputText" placeholder="Escribe tu sugerencia aquí…"></textarea>
    </div>
    <div class="form-group">
      <label>Imagen (opcional)</label>
      <div class="img-upload-area" id="uploadArea">
        <input type="file" id="inputImg" accept="image/*" onchange="previewImage(event)">
        <span class="upload-icon">🖼️</span>
        <strong>Haz clic o arrastrá una imagen</strong>
        <p>PNG, JPG, GIF, WEBP</p>
      </div>
      <img id="preview-img" alt="Vista previa">
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-confirm" onclick="confirmSuggestion()">✓ &nbsp;Confirmar sugerencia</button>
    </div>
  </div>
</div>

<!-- ══ TOAST ══ -->
<div class="toast" id="toast"></div>

<!-- ══ FOOTER ══ -->
<footer>
  <span>Pancarta de Sugerencias</span>
  <span class="slot-count">Slots usados: <span id="usedCount">0</span> / 4</span>
</footer>

<!-- ══ WHATSAPP ══ -->
<a href="https://wa.me/" target="_blank" class="wa-bubble">
  <svg width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.124.558 4.121 1.533 5.851L.057 23.177a.75.75 0 0 0 .922.899l5.233-1.707A11.943 11.943 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.826 9.826 0 0 1-5.001-1.366l-.358-.214-3.724 1.215 1.243-3.61-.234-.372A9.818 9.818 0 0 1 2.182 12C2.182 6.57 6.57 2.182 12 2.182c5.43 0 9.818 4.388 9.818 9.818 0 5.43-4.388 9.818-9.818 9.818z"/></svg>
  <span>Sugerencias<br>directas</span>
</a>

<!-- ══ SCRIPT ══ -->
<script src="pancartaSGB.js"></script>

</body>
</html>
